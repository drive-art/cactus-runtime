name: Build Cactus Android ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential python3 git unzip wget

      - name: Install Android NDK r26d
        run: |
          wget -q "https://dl.google.com/android/repository/android-ndk-r26d-linux.zip"
          unzip -q android-ndk-r26d-linux.zip
          echo "NDK=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Clone Cactus
        run: git clone https://github.com/cactus-compute/cactus

      - name: Replace telemetry with stub
        run: |
          cat > cactus/cactus/telemetry/telemetry.cpp << 'STUB'
          #include "telemetry.h"
          #include <string>
          namespace cactus { namespace telemetry {
            void setTelemetryEnvironment(const char*, const char*, const char*) {}
            void setAppId(const char*) {}
            void setCloudKey(const char*) {}
            void setCloudDisabled(bool) {}
            void setStreamMode(bool) {}
            void init(const char*, const char*, const char*) {}
            void recordInit(const char*, bool, double, const char*) {}
            void recordCompletion(const char*, const CompletionMetrics&) {}
            void recordTranscription(const char*, bool, double, double, double, int, double, const char*) {}
            void recordStreamTranscription(const char*, bool, double, double, double, int, double, double, double, int, const char*) {}
            void flush() {}
            void shutdown() {}
            std::string loadCachedCloudApiKey() { return ""; }
            void cacheCloudApiKey(const char*) {}
          }}
          STUB
          echo "✅ telemetry stub created"

      - name: Build for Android ARM64
        run: |
          cd cactus/cactus
          mkdir -p build_android && cd build_android
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON
          make -j4

      - name: Find library
        run: find cactus -name "*.so" | grep -v venv | head -10

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: libcactus-android-arm64
          path: cactus/cactus/build_android/**/*.so
