name: Build Cactus Python FFI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Clone Cactus
        run: git clone https://github.com/cactus-compute/cactus

      - name: Install deps
        run: |
          sudo apt-get install -y cmake build-essential python3 python3-pip python3-venv git libcurl4-openssl-dev

      - name: Setup and build
        run: |
          cd cactus
          source ./setup
          cactus build --python

      - name: Find library
        run: find cactus -name "*.so" | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libcactus-python-arm64
          path: cactus/build/**/*.so
