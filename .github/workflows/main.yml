name: Build Cactus v1 — All Devices

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - device: honor90
            march: "armv8.2-a+fp16+simd+dotprod"
            artifact: "libcactus-honor90.so"
          - device: poco-x3pro
            march: "armv8.2-a+dotprod"
            artifact: "libcactus-poco-x3pro.so"
          - device: poco-f1
            march: "armv8-a"
            artifact: "libcactus-poco-f1.so"
          - device: asus-zb631kl
            march: "armv8-a"
            artifact: "libcactus-asus-zb631kl.so"

    name: ${{ matrix.device }}

    steps:
      - name: Checkout Cactus v1 source
        uses: actions/checkout@v4
        with:
          repository: cactus-compute/cactus
          ref: main
          path: cactus-src

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build wget unzip

      - name: Download Android NDK r26d
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "NDK_PATH=$(pwd)/android-ndk-r26d" >> $GITHUB_ENV

      - name: Show telemetry files
        run: |
          find cactus-src -name "telemetry*" | head -20
          echo "---"
          find cactus-src/android -type f | head -20

      - name: Patch telemetry
        run: |
          TELEM=$(find cactus-src -name "telemetry.cpp" | head -1)
          HEADER=$(find cactus-src -name "telemetry.h" | head -1)
          echo "telemetry.cpp: $TELEM"
          echo "telemetry.h: $HEADER"
          if [ -n "$HEADER" ]; then
            echo "=== telemetry.h ===" && cat "$HEADER"
          fi
          if [ -n "$TELEM" ]; then
            cat > "$TELEM" << 'STUB'
#include "telemetry.h"
#include <string>
namespace cactus { namespace telemetry {
  void setTelemetryEnvironment(const char*, const char*, const char*) {}
  void setAppId(const char*) {}
  void setCloudKey(const char*) {}
  void setCloudDisabled(bool) {}
  void setStreamMode(bool) {}
  void init(const char*, const char*, const char*) {}
  void recordInit(const char*, bool, double, const char*) {}
  void recordCompletion(const char*, const CompletionMetrics&) {}
  void recordTranscription(const char*, bool, double, double, double, int, double, const char*) {}
  void recordStreamTranscription(const char*, bool, double, double, double, int, double, double, double, int, const char*) {}
  void flush() {}
  void shutdown() {}
  std::string loadCachedCloudApiKey() { return ""; }
  void cacheCloudApiKey(const char*) {}
}}
STUB
            echo "✅ patched"
          fi

      - name: Configure CMake
        run: |
          mkdir -p build-${{ matrix.device }}
          cd build-${{ matrix.device }}
          cmake ../cactus-src/android \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${NDK_PATH}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-march=${{ matrix.march }} -O3 -ffast-math" \
            -DCMAKE_C_FLAGS="-march=${{ matrix.march }} -O3 -ffast-math"

      - name: Build
        run: |
          cd build-${{ matrix.device }}
          ninja -j$(nproc)

      - name: Find and upload
        run: |
          SO=$(find build-${{ matrix.device }} -name "*.so" | grep -v "stl\|c++_shared" | head -1)
          echo "Found SO: $SO"
          ls -lh "$SO"
          cp "$SO" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 30
