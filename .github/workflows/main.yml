name: Build Cactus Python FFI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install deps
        run: sudo apt-get install -y cmake build-essential python3

      - name: Clone Cactus
        run: git clone https://github.com/cactus-compute/cactus

      - name: Build Python FFI
        run: |
          cd cactus
          source ./setup
          cactus build --python

      - name: Find and upload library
        uses: actions/upload-artifact@v4
        with:
          name: libcactus-python-ffi
          path: cactus/build/**/*.so
