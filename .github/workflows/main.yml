name: Build Cactus v1 - Poco F1

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout self
        uses: actions/checkout@v4

      - name: Checkout Cactus
        uses: actions/checkout@v4
        with:
          repository: cactus-compute/cactus
          ref: main
          path: cactus-src

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build wget unzip

      - name: Download NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip

      - name: Set NDK
        run: echo "NDK_PATH=$(pwd)/android-ndk-r26d" >> $GITHUB_ENV

      - name: Patch telemetry (simple)
        run: |
          FILE=$(find cactus-src -name "telemetry.cpp" | head -1 || true)

          if [ -n "$FILE" ]; then
            echo '#include <string>' > $FILE
            echo 'namespace cactus { namespace telemetry {' >> $FILE
            echo 'void init(...) {}' >> $FILE
            echo 'void shutdown() {}' >> $FILE
            echo '}}' >> $FILE
            echo "patched"
          else
            echo "no telemetry (ok)"
          fi

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake ../cactus-src/android \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${NDK_PATH}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cd build
          ninja -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: libcactus
          path: build/**/*.so
