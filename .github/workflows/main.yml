name: Build Cactus v1 - Poco F1

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/main.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    name: cactus-v1-poco-f1

    steps:
      - name: Checkout Cactus v1
        uses: actions/checkout@v4
        with:
          repository: cactus-compute/cactus
          ref: main
          path: cactus-src

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build wget unzip python3

      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: android-ndk-r26d
          key: ndk-r26d

      - name: Download NDK (if not cached)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip

      - name: Set NDK path
        run: echo "NDK_PATH=$(pwd)/android-ndk-r26d" >> $GITHUB_ENV

      # ⚠️ минимальный patch (если telemetry всё ещё есть)
      - name: Patch telemetry (safe stub)
        run: |
          FILE=$(find cactus-src -name "telemetry.cpp" | head -1 || true)
          if [ -n "$FILE" ]; then
            cat > "$FILE" << 'EOF'
#include <string>
namespace cactus { namespace telemetry {
  void init(...) {}
  void shutdown() {}
}}
EOF
            echo "Telemetry patched"
          else
            echo "Telemetry not found (v1 OK)"
          fi

      - name: Configure CMake (v1)
        run: |
          mkdir -p build
          cd build
          cmake ../cactus-src/android \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${NDK_PATH}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-march=armv8-a -O3" \
            -DCMAKE_CXX_FLAGS="-march=armv8-a -O3"

      - name: Build
        run: |
          cd build
          ninja -j$(nproc)
          find . -name "*.so"

      - name: Strip binary (уменьшаем размер)
        run: |
          ${NDK_PATH}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip \
          build/**/*.so || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: libcactus-v1-poco-f1
          path: build/**/*.so
          retention-days: 30
