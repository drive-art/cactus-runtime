name: Build Cactus v1 — All Devices

on:
  workflow_dispatch:
    inputs:
      cactus_version:
        description: 'Cactus version (main for v1, or v0.x tag)'
        default: 'main'
        required: false
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - device: honor90
            chip: "Snapdragon 7 Gen1"
            march: "armv8.4-a+dotprod+fp16"

          - device: poco-x3pro
            chip: "Snapdragon 860"
            march: "armv8.2-a+dotprod+fp16"

          - device: poco-f1
            chip: "Snapdragon 845"
            march: "armv8-a"

          - device: asus-zb631kl
            chip: "Snapdragon 660"
            march: "armv8-a"

    name: Build Cactus v1 for ${{ matrix.device }}

    steps:
      - name: Checkout Cactus v1
        uses: actions/checkout@v4
        with:
          repository: cactus-compute/cactus
          ref: ${{ github.event.inputs.cactus_version || 'main' }}
          path: cactus-src

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build python3 python3-pip curl wget unzip

      - name: Download Android NDK r26d
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "NDK_PATH=$(pwd)/android-ndk-r26d" >> $GITHUB_ENV

      - name: Setup Cactus build environment
        run: |
          cd cactus-src
          source ./setup || echo "setup script not found, continuing..."
          echo "✅ Cactus environment ready"

      - name: Build for ${{ matrix.device }}
        run: |
          cd cactus-src
          mkdir -p build-${{ matrix.device }}
          cd build-${{ matrix.device }}
          
          cmake ../android \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${NDK_PATH}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-march=${{ matrix.march }} -O3 -ffast-math -fno-exceptions" \
            -DCMAKE_C_FLAGS="-march=${{ matrix.march }} -O3 -ffast-math" \
            -DCACTUS_ANDROID=ON \
            -DCACTUS_PYTHON=ON
          
          ninja -j$(nproc)
          echo "✅ Build for ${{ matrix.device }} completed"

      - name: Locate and verify output
        run: |
          cd cactus-src/build-${{ matrix.device }}
          
          SO=$(find . -name "libcactus.so" -o -name "libcactus_android.so" | head -1)
          if [ -z "$SO" ]; then
            echo "❌ .so file not found!"
            find . -name "*.so" -o -name "*.a" | head -20
            exit 1
          fi
          
          cp "$SO" "libcactus-${{ matrix.device }}.so"
          ls -lh "libcactus-${{ matrix.device }}.so"
          
          file "libcactus-${{ matrix.device }}.so"
          
          if ! file "libcactus-${{ matrix.device }}.so" | grep -q "aarch64"; then
            echo "❌ Wrong architecture!"
            exit 1
          fi
          
          echo "✅ Artifact verified: libcactus-${{ matrix.device }}.so"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libcactus-${{ matrix.device }}
          path: cactus-src/build-${{ matrix.device }}/libcactus-${{ matrix.device }}.so
          retention-days: 30
