name: Build Cactus Android ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential python3 python3-pip python3-venv git unzip wget

      - name: Install Android NDK r26d
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "NDK=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Clone Cactus
        run: git clone https://github.com/cactus-compute/cactus

      - name: Build for Android ARM64
        run: |
          cd cactus/cactus
          mkdir -p build_android && cd build_android
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_SHARED_LINKER_FLAGS="-Wl,--exclude-libs,ALL"
          make -j4

      - name: Find library
        run: find cactus -name "*.so" | grep -v venv | head -10

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: libcactus-android-arm64
          path: cactus/cactus/cactus/build_android/**/*.so
