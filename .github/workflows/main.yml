name: Build Cactus — All Devices

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - device: honor90
            chip: "Snapdragon 7 Gen1"
            march: "armv8.4-a+dotprod+fp16"
            artifact: "libcactus-honor90.so"

          - device: poco-x3pro
            chip: "Snapdragon 860"
            march: "armv8.2-a+dotprod+fp16"
            artifact: "libcactus-poco-x3pro.so"

          - device: poco-f1
            chip: "Snapdragon 845"
            march: "armv8-a"
            artifact: "libcactus-poco-f1.so"

          - device: asus-zb631kl
            chip: "Snapdragon 660"
            march: "armv8-a"
            artifact: "libcactus-asus-zb631kl.so"

    name: Build for ${{ matrix.device }}

    steps:
      - name: Checkout Cactus
        uses: actions/checkout@v4
        with:
          repository: cactus-compute/cactus
          ref: main
          path: cactus-src

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build wget unzip

      - name: Download NDK r26d
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "NDK_PATH=$(pwd)/android-ndk-r26d" >> $GITHUB_ENV

      - name: Patch telemetry
        run: |
          TELEM=$(find cactus-src -name "telemetry.cpp" | head -1)
          if [ -f "$TELEM" ]; then
            echo "#include \"telemetry.h\"" > "$TELEM"
            echo "namespace cactus { namespace telemetry {" >> "$TELEM"
            echo "void init(const char*, const char*, const char*) {}" >> "$TELEM"
            echo "void recordInit(const char*, bool, double, const char*) {}" >> "$TELEM"
            echo "void recordCompletion(const char*, int, int, double, double, bool) {}" >> "$TELEM"
            echo "void flush() {}" >> "$TELEM"
            echo "void shutdown() {}" >> "$TELEM"
            echo "}}" >> "$TELEM"
          fi

      - name: Configure CMake
        run: |
          mkdir -p cactus-src/build-${{ matrix.device }}
          cd cactus-src/build-${{ matrix.device }}
          cmake ../android \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${NDK_PATH}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-march=${{ matrix.march }} -O3" \
            -DCMAKE_C_FLAGS="-march=${{ matrix.march }} -O3"

      - name: Build
        run: |
          cd cactus-src/build-${{ matrix.device }}
          ninja -j$(nproc)

      - name: Locate artifact
        run: |
          SO=$(find cactus-src/build-${{ matrix.device }} -name "*.so" | head -1)
          cp "$SO" "${{ matrix.artifact }}"
          ls -lh "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 30
