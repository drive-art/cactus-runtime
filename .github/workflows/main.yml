name: Build Cactus v1 - Poco F1 Only

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-poco-f1:
    runs-on: ubuntu-latest
    name: Poco F1 (Snapdragon 845)

    steps:
      - name: Checkout Cactus
        uses: actions/checkout@v4
        with:
          repository: cactus-compute/cactus
          ref: main
          path: cactus-src

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build wget unzip

      - name: Download NDK r26d
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "NDK_PATH=$(pwd)/android-ndk-r26d" >> $GITHUB_ENV

      - name: Build for Poco F1
        run: |
          cd cactus-src
          mkdir -p build-poco-f1
          cd build-poco-f1
          cmake ../android -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${NDK_PATH}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_CXX_FLAGS="-march=armv8-a -O3" \
            -DCMAKE_C_FLAGS="-march=armv8-a -O3"
          ninja -j$(nproc)

      - name: Upload Poco F1
        run: |
          SO=$(find cactus-src/build-poco-f1 -name "*.so" | head -1)
          cp "$SO" "libcactus-poco-f1.so"
          ls -lh libcactus-poco-f1.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libcactus-poco-f1
          path: libcactus-poco-f1.so
          retention-days: 30
