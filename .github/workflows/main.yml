name: Build Cactus v0 — All Devices

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - device: honor90
            march: "armv8.2-a+fp16+simd+dotprod"
            artifact: "libcactus-honor90.so"

          - device: poco-x3pro
            march: "armv8.2-a+dotprod"
            artifact: "libcactus-poco-x3pro.so"

          - device: poco-f1
            march: "armv8-a"
            artifact: "libcactus-poco-f1.so"

          - device: asus-zb631kl
            march: "armv8-a"
            artifact: "libcactus-asus-zb631kl.so"

    name: ${{ matrix.device }}

    steps:
      - name: Checkout Cactus source
        uses: actions/checkout@v4
        with:
          repository: cactus-compute/cactus
          ref: main
          path: cactus-src

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build wget unzip

      - name: Download Android NDK r26d
        
        
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "NDK_PATH=$(pwd)/android-ndk-r26d" >> $GITHUB_ENV

      - name: Patch telemetry.cpp
        run: |
          TELEM=$(find cactus-src -name "telemetry.cpp" | head -1)
          HEADER=$(find cactus-src -name "telemetry.h" | head -1)
          if [ -n "$TELEM" ] && [ -n "$HEADER" ]; then
            # Генерируем заглушку из заголовка
            cat > "$TELEM" << 'STUB'
          // STUB: telemetry disabled for Android build (no libcurl in NDK)
          #include "telemetry.h"
          namespace cactus { namespace telemetry {
            void init(const char*, const char*, const char*) {}
            void recordInit(const char*, bool, double, const char*) {}
            void recordCompletion(const char*, int, int, double, double, bool) {}
            void recordError(const char*, const char*) {}
            void flush() {}
            void shutdown() {}
          }}
          STUB
            echo "✅ telemetry.cpp patched"
          else
            echo "⚠️ telemetry.cpp not found, skipping patch"
          fi

      - name: Configure CMake
        run: |
          mkdir -p build-${{ matrix.device }}
          cd build-${{ matrix.device }}
          cmake ../cactus-src/android \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${NDK_PATH}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-march=${{ matrix.march }} -O3 -ffast-math" \
            -DCMAKE_C_FLAGS="-march=${{ matrix.march }} -O3 -ffast-math"

      - name: Build
        run: |
          cd build-${{ matrix.device }}
          ninja -j$(nproc)
          SO=$(find . -name "*.so" | grep -v "stl" | head -1)
          echo "Found: $SO"
          cp "$SO" "${{ matrix.artifact }}"
          ls -lh "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build-${{ matrix.device }}/${{ matrix.artifact }}
          retention-days: 30
