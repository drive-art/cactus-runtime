name: Build Cactus v1 - Poco F1

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/main.yml"
      - "scripts/**"

jobs:
  build:
    runs-on: ubuntu-latest
    name: cactus-v1-poco-f1

    steps:
      - name: Checkout repo (self)
        uses: actions/checkout@v4

      - name: Checkout Cactus
        uses: actions/checkout@v4
        with:
          repository: cactus-compute/cactus
          ref: main
          path: cactus-src

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build wget unzip python3

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: android-ndk-r26d
          key: ndk-r26d

      - name: Download NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip

      - name: Set NDK path
        run: echo "NDK_PATH=$(pwd)/android-ndk-r26d" >> $GITHUB_ENV

      - name: Patch telemetry (safe)
        run: python3 scripts/patch_telemetry.py

      - name: Configure
        run: |
          mkdir -p build
          cd build
          cmake ../cactus-src/android \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${NDK_PATH}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-march=armv8-a -O3" \
            -DCMAKE_CXX_FLAGS="-march=armv8-a -O3"

      - name: Build
        run: |
          cd build
          ninja -j$(nproc)

      - name: Strip
        run: |
          ${NDK_PATH}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip build/**/*.so || true

      - name: Show artifacts
        run: find build -name "*.so"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: libcactus-v1-poco-f1
          path: build/**/*.so
          retention-days: 30
